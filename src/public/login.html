<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Casa de Perainda - Acesso Restrito</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }
    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }
    .login-header h1 {
      margin: 0;
      color: #333;
      font-size: 28px;
      font-weight: 600;
    }
    .login-header p {
      color: #666;
      margin: 8px 0 0 0;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
      transition: border-color 0.3s;
    }
    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #2a5298;
      box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.1);
    }
    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(42, 82, 152, 0.3);
    }
    button:active {
      transform: translateY(0);
    }
    .error {
      color: #d32f2f;
      font-size: 13px;
      margin-top: 4px;
      display: none;
    }
    .loading {
      display: none;
      text-align: center;
      margin-top: 20px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>Casa de Perainda</h1>
      <p>Acesso Restrito - Oportunidade de Investimento</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="usuario">Usuário</label>
        <input type="text" id="usuario" name="usuario" value="beto" readonly>
      </div>

      <div class="form-group">
        <label for="senha">Senha (seu celular com DDI)</label>
        <input type="password" id="senha" name="senha" placeholder="Ex: 5511999999999" required>
        <div class="error" id="erro"></div>
      </div>

      <button type="submit">Entrar</button>
      <div class="loading" id="loading">Autenticando...</div>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const usuario = document.getElementById('usuario').value;
      const senha = document.getElementById('senha').value.replace(/\D/g, '');
      const errorDiv = document.getElementById('erro');
      const loading = document.getElementById('loading');
      const button = document.querySelector('button');

      errorDiv.style.display = 'none';
      loading.style.display = 'block';
      button.disabled = true;

      try {
        const response = await fetch('.netlify/functions/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ usuario, senha }),
        });

        const data = await response.json();

        if (response.ok) {
          window.location.href = data.redirect || '/';
        } else {
          errorDiv.textContent = data.erro || 'Erro ao autenticar';
          errorDiv.style.display = 'block';
        }
      } catch (erro) {
        errorDiv.textContent = 'Erro ao conectar. Tente novamente.';
        errorDiv.style.display = 'block';
      } finally {
        loading.style.display = 'none';
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
